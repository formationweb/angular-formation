<h1>Users</h1>

<!-- <app-opacity [opacity]="0.3" color="red" (onChange)="listenOpacity($event)" /> -->
 <!-- <app-draw /> -->
<select [(ngModel)]="extSelected">
    <option value="">Tous</option>
    @for (ext of extensions() ; track ext) {
         <option>{{ ext }}</option>
    }
</select>

<app-loader [loading]="false">
    @for (u of usersFiltered(); track u.id) {
        <app-user-card [user]="u">
            <div class="header">header</div>
            <div footer>Footer</div>
        </app-user-card>
    }
</app-loader>
