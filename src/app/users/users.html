<h1>Users</h1>

<!-- <app-opacity [opacity]="0.3" color="red" (onChange)="listenOpacity($event)" /> -->
 <!-- <app-draw /> -->
<select [(ngModel)]="extSelected">
    <option value="">Tous</option>
    @for (ext of extensions() ; track ext) {
         <option>{{ ext }}</option>
    }
</select>

<input type="text" [(ngModel)]="indexInput" />
<button (click)="scrollToUser()">Scroll To user</button>
@if (indexError()) {
    <p>{{ indexError() }}</p>
}

<app-loader [loading]="usersResource.isLoading()">
    @for (u of usersResource.value(); track u.id) {
        <div #userCardRef>
            <app-user-card [user]="u">
                <div class="header">header</div>
                <div footer>Footer</div>
            </app-user-card>
        </div>
    }
</app-loader>
