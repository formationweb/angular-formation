<h1>{{ user.name }}</h1>

<form [formGroup]="form" (ngSubmit)="edit()">
    <label>Email</label>
    <input type="text" formControlName="email">

    <label>Nom</label>
    <input type="text" formControlName="name">

    <label>Username</label>
    <input type="text" formControlName="username">

    <button>Modifier</button>
</form>
