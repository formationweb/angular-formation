<h1>{{ 'Utilisateur' | plural:nbSelected }}</h1>

<select [(ngModel)]="nbSelected">
    <option>0</option>
    <option>1</option>
    <option>2</option>
</select>

<app-loader [loading]="isLoading">
    @for (u of users ; track u.id) {
        <app-user-card [user]="u">
            <h1 class="title" #refTitle>Titre</h1>
            <h2 class="footer">Footer</h2>
        </app-user-card>
    }
</app-loader>
