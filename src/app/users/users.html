<h1>{{ 'Utilisateur' | plural:usersFiltered().length }}</h1>

 <app-draw />

<select [(ngModel)]="extSelected">
    <option value="">Tous</option>
    @for (ext of extensions() ; track ext) {

    }
</select>

@for (u of usersFiltered() ; track u.id) {

        <h1 class="title">test</h1>
        <h2>footer</h2>
    </app-user-card>
}
