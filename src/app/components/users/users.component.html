<h1>utilisateurs</h1>

<app-alpha-range [opacity]="0.6" (onChange)="listenOpacity($event)" />

<app-loader [loading]="loading()">

        <app-user-card [user]="u">
            <h1 class="header">entête</h1>
            <h1 class="footer">pied de carte</h1>
        </app-user-card>
    }
</app-loader>
