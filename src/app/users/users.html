<h1>{{ 'Utilisateur' | plural:usersFiltered().length }}</h1>

<!-- <app-opacity (onChange)="listenOpacity($event)"></app-opacity> -->

<!-- <app-draw /> -->

<select [(ngModel)]="extSelected">
    <option value="">Tous</option>
    @for (ext of extensions() ; track ext) {
        <option>{{ ext }}</option>
    }
</select>

<input type="text" [(ngModel)]="userIndex">
<button (click)="scrollToUser()">Scroll To User</button>
@if (errorMessage()) {
    <p>{{ errorMessage() }}</p>
}

<app-loader [loading]="false">
    @for (u of usersFiltered() ; track u.id) {
        <div #userRef>
            <app-user-card [user]="u">
                <h1 class="header">test</h1>
                <h1 class="footer">footer</h1>
            </app-user-card>
        </div>
    }
</app-loader>
