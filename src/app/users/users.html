<h1>Users</h1>

<app-opacity [opacity]="0.5" (onChange)="listenOpacity($event)" />

<select [(ngModel)]="extSelected">
    <option value="">Tous</option>
    @for (ext of extensions() ; track ext) {
        <option>{{ext}}</option>
    }
</select>

<input type="text" [(ngModel)]="indexSelected" />
<button (click)="scrollToUser()">Scroll To User</button>

@if (error()) {
    <div>
        {{ error() }}
    </div>
}

<app-loader [loading]="loading()">
    @for (u of usersFiltered() ; track u.id) {
        <div #userCardRef>
            <app-user-card [user]="u">
                <h1 class="head"></h1>
            </app-user-card>
        </div>
    }
</app-loader>
