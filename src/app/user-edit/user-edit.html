<h1>{{ user()?.name }}</h1>

<form (ngSubmit)="editUser()" [formGroup]="form">
    <label>Name</label>
     <input type="text" [formControl]="nameField">

     <label>Username</label>
     <input type="text" formControlName="username">

      <label>Email</label>
     <input type="text" formControlName="email">

     <button>Modifier</button>
</form>
